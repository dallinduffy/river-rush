<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>River Rush — World 2: Jungle</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#030a03;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}canvas{border-radius:10px;display:block}p{color:#2a4a1a;font-size:12px;margin-top:8px;text-align:center;font-family:monospace}</style>
</head>
<body>
<canvas id="rc" width="420" height="620"></canvas>
<p>Arrow keys to steer · Space to start · Whirlpools pull — stay away from the center!</p>
<script>
const cv=document.getElementById('rc'),X=cv.getContext('2d'),W=cv.width,H=cv.height;
const RL=72,RR=348,RW=RR-RL;
const TITLE=0,PLAY=1,WARN=2,BOSS=3,WIN=4,DEAD=5;
const WD=150,BOSS_DUR=540,CROC_CW=52;
let gs=TITLE,fc=0;
const P={x:W/2,y:H-120,w:16,h:36,spd:4,alive:true};
let spd=2.8,dist=0,scroll=0,st=30,wst=90;
const LEN=3600;
let obs=[],mps=[],prt=[],wps=[],placed=[0,0,0],got=0;
let bDir=1,bOff=0;
let bt=0,brt=0,bwst=220,warnBt=0;
let croc={y:H+80,targetY:H+80,retreating:false,jawAng:0};
let runScore=0,bestScore=0,everCleared=false,isNewBest=false;

function loadBest(){try{const d=JSON.parse(localStorage.getItem('rr_w2')||'{}');bestScore=d.s||0;everCleared=d.c||false;}catch(e){}}
function saveBest(){try{const ok=runScore>bestScore||(gs===WIN&&!everCleared);if(ok){if(runScore>bestScore)bestScore=runScore;if(gs===WIN)everCleared=true;localStorage.setItem('rr_w2',JSON.stringify({s:bestScore,c:everCleared}));}}catch(e){}}
loadBest();

const keys={};
document.addEventListener('keydown',e=>{if(e.code==='Escape'){window.location.href='river-rush-menu.html';return;}keys[e.code]=true;if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code))e.preventDefault();if((e.code==='Space'||e.code==='Enter')&&[TITLE,DEAD,WIN].includes(gs))reset();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// Atmosphere
const flines=Array.from({length:20},()=>({x:RL+Math.random()*RW,y:Math.random()*H,len:14+Math.random()*22,a:0.05+Math.random()*0.09}));
const fireflies=Array.from({length:18},()=>({x:Math.random()<.5?Math.random()*RL:RR+Math.random()*(W-RR),y:Math.random()*H,ph:Math.random()*Math.PI*2,spd:0.18+Math.random()*0.3}));
// Pre-computed bank tree shapes
const ltrees=[[8,90,64],[28,110,52],[52,78,70],[18,130,60],[42,95,58]];
const rtrees=[[W-14,95,68],[W-38,115,56],[W-58,82,72],[W-22,125,62],[W-46,100,55]];
// Vine anchor points on banks
const lvines=[{x:16,len:100},{x:42,len:140},{x:62,len:90},{x:28,len:120}];
const rvines=[{x:W-18,len:110},{x:W-44,len:130},{x:W-62,len:85}];

function mkRock(x,y,r){const pts=[],n=7+~~(Math.random()*4);for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2,rr=r*(.65+Math.random()*.45);pts.push([Math.cos(a)*rr,Math.sin(a)*rr]);}return{x,y,r,pts};}
function mkWp(y){const r=24+Math.random()*14,str=0.55+Math.random()*0.55,spn=Math.random()<.5?1:-1;return{x:RL+r+12+Math.random()*(RW-r*2-24),y,r,str,spn};}
function rrect(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.arcTo(x+w,y,x+w,y+r,r);X.lineTo(x+w,y+h-r);X.arcTo(x+w,y+h,x+w-r,y+h,r);X.lineTo(x+r,y+h);X.arcTo(x,y+h,x,y+h-r,r);X.lineTo(x,y+r);X.arcTo(x,y,x+r,y,r);X.closePath();}
function star(spk,oR,iR){X.beginPath();let rot=-Math.PI/2,step=Math.PI/spk;X.moveTo(Math.cos(rot)*oR,Math.sin(rot)*oR);for(let i=0;i<spk;i++){rot+=step;X.lineTo(Math.cos(rot)*iR,Math.sin(rot)*iR);rot+=step;X.lineTo(Math.cos(rot)*oR,Math.sin(rot)*oR);}X.closePath();}
function rn(a,b){return a+Math.random()*(b-a);}
function computeBend(d){const s=1300,e=1900;if(d<s)return 0;if(d>=e)return bDir*40;const p=(d-s)/(e-s),sm=p*p*(3-2*p);return bDir*40*sm;}
function fmt(n){return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function calcScore(){return got*2000+~~dist+(gs===WIN?5000:0);}

function reset(){
  gs=PLAY;fc=0;spd=2.8;dist=0;scroll=0;st=30;wst=90;
  P.x=W/2;P.y=H-120;P.alive=true;
  obs=[];mps=[];prt=[];wps=[];placed=[0,0,0];got=0;
  bt=0;brt=0;bwst=220;warnBt=0;
  croc={y:H+80,targetY:H+80,retreating:false,jawAng:0};
  runScore=0;isNewBest=false;
  bDir=Math.random()<.5?1:-1;bOff=0;
}

function spawnRocks(){
  if(Math.random()<.28){const r1=13+Math.random()*9,r2=13+Math.random()*9,g=38+Math.random()*16,tot=r1+g+r2;if(tot<RW-24){const x1=RL+r1+4+Math.random()*(RW-tot-8),x2=x1+r1+g+r2;if(x2+r2<RR-4){obs.push(mkRock(x1,-r1-4,r1));obs.push(mkRock(x2,-r2-4,r2));return;}}}
  const r=16+Math.random()*10;obs.push(mkRock(RL+r+4+Math.random()*(RW-r*2-8),-r-4,r));
}
function spawnMp(i){mps.push({x:RL+30+Math.random()*(RW-60),y:-24,i,got:false,ph:Math.random()*Math.PI*2});placed[i]=1;}

function hit(){
  if(!P.alive)return;P.alive=false;
  for(let i=0;i<14;i++)prt.push({x:P.x,y:P.y,vx:rn(-4,4),vy:-2-Math.random()*3,life:55+Math.random()*30,ml:85,c:'#50c840',s:2+Math.random()*3.5});
  runScore=calcScore();isNewBest=runScore>bestScore;saveBest();
  setTimeout(()=>{gs=DEAD;},950);
}

function col(){
  if(!P.alive)return;
  const px=P.x,py=P.y,pr=P.w/2-1;
  const rpx=px-~~bOff;
  if(rpx-pr<RL||rpx+pr>RR){hit();return;}
  for(const o of obs){const dx=rpx-o.x,dy=py-o.y;if(dx*dx+dy*dy<(pr+o.r*.7)*(pr+o.r*.7)){hit();return;}}
  // Whirlpool pull + vortex collision
  for(const w of wps){
    const dx=w.x-rpx,dy=w.y-py,d=Math.sqrt(dx*dx+dy*dy);
    const pullR=w.r*2.6;
    if(d<pullR&&d>1){
      const force=w.str*(1-d/pullR);
      P.x+=(dx/d)*force;P.y+=(dy/d)*force*0.22;
      P.x=Math.max(RL+P.w/2+1,Math.min(RR-P.w/2-1,P.x));
      if(d<w.r*0.52){hit();return;}
    }
  }
  for(const m of mps){if(m.got)continue;const dx=px-m.x,dy=py-m.y;if(dx*dx+dy*dy<(pr+17)*(pr+17)){m.got=true;got++;for(let i=0;i<12;i++)prt.push({x:m.x,y:m.y,vx:rn(-3.5,3.5),vy:-1.5-Math.random()*2.5,life:45+Math.random()*20,ml:65,c:'#f0c030',s:2+Math.random()*3});}}
  // Croc collision during boss
  if(gs===BOSS&&!croc.retreating){
    if(py>croc.y-14&&px>W/2-CROC_CW-4&&px<W/2+CROC_CW+4){hit();return;}
  }
}

function upd(){
  fc++;
  for(const f of flines){f.y+=spd*.48;if(f.y>H){f.y=-f.len;f.x=RL+Math.random()*RW;}}
  for(const ff of fireflies){
    ff.ph+=0.035+ff.spd*.025;
    ff.x+=Math.cos(ff.ph*.8)*0.4;
    ff.y+=Math.sin(ff.ph)*.5+(spd*.04);
    if(ff.y>H)ff.y=-4;
    if(ff.x<RL){const gx=Math.random()*RL;ff.x=gx;}
    if(ff.x>RR&&ff.x<RR+(W-RR)){/* keep on right bank */}
  }
  for(let i=prt.length-1;i>=0;i--){const p=prt[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life--;if(p.life<=0)prt.splice(i,1);}
  if([TITLE,DEAD,WIN].includes(gs))return;
  if(gs===WARN){
    warnBt++;if(warnBt>=WD){gs=BOSS;bt=0;brt=40;bwst=220;}
    return;
  }
  if(!P.alive)return;
  if(keys['ArrowLeft'])P.x-=P.spd;if(keys['ArrowRight'])P.x+=P.spd;
  if(keys['ArrowUp'])P.y-=P.spd*.55;if(keys['ArrowDown'])P.y+=P.spd*.55;
  P.x=Math.max(RL+~~bOff+P.w/2+1,Math.min(RR+~~bOff-P.w/2-1,P.x));P.y=Math.max(H*.1,Math.min(H-60,P.y));

  if(gs===PLAY){
    dist+=spd;scroll+=spd;spd=Math.min(5.5,2.8+dist/2000);
    const nb=computeBend(dist),db=nb-bOff;bOff=nb;if(db){P.x+=db;P.x=Math.max(RL+~~bOff+P.w/2+1,Math.min(RR+~~bOff-P.w/2-1,P.x));}
    // Rocks
    if(dist>200){st--;if(st<=0){spawnRocks();const prog=Math.min(1,(dist-200)/(LEN-200));st=~~(52-prog*34)+~~(Math.random()*14);}}
    for(let i=obs.length-1;i>=0;i--){obs[i].y+=spd;if(obs[i].y>H+55)obs.splice(i,1);}
    // Whirlpools
    if(dist>650){wst--;if(wst<=0){wps.push(mkWp(-60));const wp=Math.min(1,(dist-650)/(LEN-650));wst=~~(100-wp*38)+~~(Math.random()*28);}}
    for(let i=wps.length-1;i>=0;i--){wps[i].y+=spd*.55;if(wps[i].y>H+70)wps.splice(i,1);}
    // Map pieces
    const ms=[.28,.58,.87];for(let i=0;i<3;i++)if(!placed[i]&&dist>=LEN*ms[i])spawnMp(i);
    for(let i=mps.length-1;i>=0;i--){mps[i].y+=spd;if(mps[i].y>H+38){if(!mps[i].got){mps[i].y=-24;mps[i].x=RL+30+Math.random()*(RW-60);}else mps.splice(i,1);}}
    if(got>=3){obs=[];wps=[];gs=WARN;warnBt=0;}
    col();
  } else if(gs===BOSS){
    scroll+=spd*.85;
    bt++;
    // Croc targeting
    if(!croc.retreating){
      const bprog=Math.min(1,bt/BOSS_DUR);
      croc.targetY=H*0.88-bprog*(H*0.88-H*0.68);
      if(bt>=BOSS_DUR)croc.retreating=true;
    } else {
      croc.targetY=H+130;
    }
    croc.y+=(croc.targetY-croc.y)*0.045;
    croc.jawAng+=0.07;
    // Boss rocks
    brt--;if(brt<=0){spawnRocks();brt=34+~~(Math.random()*22);}
    for(let i=obs.length-1;i>=0;i--){obs[i].y+=spd*.88;if(obs[i].y>croc.y-18||obs[i].y>H+55)obs.splice(i,1);}
    // Occasional whirlpools
    bwst--;if(bwst<=0&&bt>100){wps.push(mkWp(-60));bwst=210+~~(Math.random()*90);}
    for(let i=wps.length-1;i>=0;i--){wps[i].y+=spd*.5;if(wps[i].y>croc.y-55||wps[i].y>H+70)wps.splice(i,1);}
    // Win: croc retreated off screen
    if(croc.retreating&&croc.y>H+105){gs=WIN;runScore=calcScore();isNewBest=runScore>bestScore||!everCleared;saveBest();}
    col();
  }
}

// ---- DRAW ----
function drawBg(){
  // Sky — dark jungle canopy
  const sg=X.createLinearGradient(0,0,0,H*.3);
  sg.addColorStop(0,'#040c02');sg.addColorStop(1,'#0c1e08');
  X.fillStyle=sg;X.fillRect(0,0,W,H*.3);
  // Far canopy silhouettes
  X.fillStyle='#0a1606';
  [[18,70,95],[100,58,110],[202,62,108],[306,52,118],[398,68,92]].forEach(([mx,mh,mw])=>{
    X.beginPath();X.moveTo(mx-mw/2,H*.3);
    for(let s=0;s<=10;s++)X.lineTo(mx-mw/2+s*(mw/10),H*.3-mh+Math.sin(s*1.7+mx*.05)*11);
    X.lineTo(mx+mw/2,H*.3);X.closePath();X.fill();
  });
  // Mid canopy
  X.fillStyle='#102208';
  [[0,65,80],[88,72,96],[192,66,102],[308,70,90],[412,60,82]].forEach(([mx,mh,mw])=>{
    X.beginPath();X.moveTo(mx-mw/2,H*.34);
    for(let s=0;s<=10;s++)X.lineTo(mx-mw/2+s*(mw/10),H*.34-mh+Math.sin(s*2.1+mx*.04)*9);
    X.lineTo(mx+mw/2,H*.34);X.closePath();X.fill();
  });
  // Banks
  X.fillStyle='#183810';X.fillRect(0,0,RL+~~bOff,H);X.fillRect(RR+~~bOff,0,W-RR-~~bOff,H);
  // Bank scroll texture
  const sy=-(~~scroll%38);for(let y=sy;y<H;y+=38){X.fillStyle='rgba(0,0,0,.04)';X.fillRect(0,y,RL,19);X.fillRect(RR,y,W-RR,19);}
  // Vines on banks
  X.strokeStyle='#284818';X.lineWidth=2;
  lvines.forEach(v=>{X.beginPath();X.moveTo(v.x,0);for(let y=0;y<v.len;y+=6)X.lineTo(v.x+Math.sin((y+scroll*.2)*.12)*5,y);X.stroke();});
  rvines.forEach(v=>{X.beginPath();X.moveTo(v.x,0);for(let y=0;y<v.len;y+=6)X.lineTo(v.x+Math.sin((y+scroll*.2+1.2)*.12)*5,y);X.stroke();});
  // Bank edge (bright green stripe)
  X.fillStyle='#3a6822';X.fillRect(RL+~~bOff-6,0,6,H);X.fillRect(RR+~~bOff,0,6,H);
  // River (dark murky green-brown)
  X.fillStyle='#0d2214';X.save();X.translate(~~bOff,0);X.fillRect(RL,0,RW,H);X.restore();
  // River flow lines
  for(const f of flines){X.save();X.globalAlpha=f.a;X.strokeStyle='#1a5028';X.lineWidth=1.5;X.beginPath();X.moveTo(f.x,f.y);X.lineTo(f.x+1,f.y+f.len);X.stroke();X.restore();}
  // Fireflies
  for(const ff of fireflies){
    const glow=0.25+Math.sin(ff.ph*2.1)*.25;if(glow<0.05)continue;
    X.save();X.globalAlpha=glow;X.fillStyle='#b8f030';
    X.shadowColor='#90e018';X.shadowBlur=10;
    X.beginPath();X.arc(ff.x,ff.y,1.6,0,Math.PI*2);X.fill();X.restore();
  }
}

function drawObs(){X.save();X.translate(~~bOff,0);
  for(const o of obs){
    X.save();X.translate(o.x,o.y);
    X.globalAlpha=.15;X.fillStyle='#50a830';X.beginPath();X.ellipse(0,0,o.r+7,o.r+4,0,0,Math.PI*2);X.fill();
    X.globalAlpha=1;X.fillStyle='#485840';
    X.beginPath();X.moveTo(o.pts[0][0],o.pts[0][1]);o.pts.forEach(([a,b])=>X.lineTo(a,b));X.closePath();X.fill();
    X.fillStyle='#627050';X.beginPath();X.ellipse(-o.r*.18,-o.r*.28,o.r*.3,o.r*.17,-.4,0,Math.PI*2);X.fill();
    X.restore();
  }
}

function drawWhirlpools(){X.save();X.translate(~~bOff,0);
  for(const w of wps){
    X.save();X.translate(w.x,w.y);
    const spin=fc*.032*w.spn;
    // Outer pull glow
    const og=X.createRadialGradient(0,0,w.r*.4,0,0,w.r*2.6);
    og.addColorStop(0,'rgba(20,100,40,.18)');og.addColorStop(1,'rgba(10,50,20,0)');
    X.globalAlpha=1;X.fillStyle=og;X.beginPath();X.arc(0,0,w.r*2.6,0,Math.PI*2);X.fill();
    // Rotating arcs (3 rings)
    for(let ri=3;ri>0;ri--){
      const rr=w.r*(ri/3);
      X.save();X.rotate(spin+ri*.8);
      X.globalAlpha=0.12+ri*.07;X.strokeStyle='#28904a';X.lineWidth=2+ri*.4;
      X.beginPath();X.arc(0,0,rr,0,Math.PI*1.7);X.stroke();
      X.restore();
    }
    // Center void
    const cg=X.createRadialGradient(0,0,0,0,0,w.r*.55);
    cg.addColorStop(0,'#020a04');cg.addColorStop(1,'rgba(2,10,4,0)');
    X.globalAlpha=0.85;X.fillStyle=cg;X.beginPath();X.arc(0,0,w.r*.55,0,Math.PI*2);X.fill();
    // Foam flecks near pull zone
    X.globalAlpha=0.18;X.fillStyle='#c8e8b0';
    for(let fi=0;fi<4;fi++){
      const fa=spin*2+fi*(Math.PI*.5),fr=w.r*(0.65+fi*.12);
      X.beginPath();X.arc(Math.cos(fa)*fr,Math.sin(fa)*fr,2.5,0,Math.PI*2);X.fill();
    }
    X.globalAlpha=1;X.restore();
  }
X.restore();X.restore();}
function drawMps(){X.save();X.translate(~~bOff,0);
  for(const m of mps){
    if(m.got)continue;
    const bob=Math.sin(fc*.06+m.ph)*3,gl=.28+Math.sin(fc*.09)*.14;
    X.save();X.translate(m.x,m.y+bob);
    X.globalAlpha=gl;X.fillStyle='#ffe060';X.beginPath();X.arc(0,0,21,0,Math.PI*2);X.fill();
    X.globalAlpha=1;star(5,14,6.5);X.fillStyle='#f0c030';X.fill();X.strokeStyle='#fff8cc';X.lineWidth=1.5;X.stroke();
    X.fillStyle='#7a5010';X.font='bold 8px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText('MAP',0,0);
    X.restore();
  }
X.restore();}
function drawPlayer(){
  if(!P.alive)return;
  const{x,y,w,h}=P,wob=Math.sin(fc*.12)*1.5;
  X.save();X.translate(x,y);X.rotate(wob*.035);
  X.globalAlpha=.16;X.strokeStyle='#58c840';X.lineWidth=2;X.beginPath();X.ellipse(0,h/2+4,w/2+5,5,0,0,Math.PI*2);X.stroke();
  X.globalAlpha=1;X.fillStyle='#e03030';X.beginPath();X.ellipse(0,0,w/2,h/2,0,0,Math.PI*2);X.fill();
  X.strokeStyle='#a01818';X.lineWidth=1;X.beginPath();X.moveTo(0,-h/2+3);X.lineTo(0,h/2-3);X.stroke();
  X.fillStyle='#5a0808';X.beginPath();X.ellipse(0,-h*.05,w*.26,h*.14,0,0,Math.PI*2);X.fill();
  X.strokeStyle='#b88840';X.lineWidth=2.5;X.lineCap='round';
  X.beginPath();X.moveTo(-w-7+wob,-h*.1);X.lineTo(w+7-wob,h*.1);X.stroke();
  X.save();X.translate(-w-7+wob,-h*.1);X.rotate(-.3);X.fillStyle='#b88840';X.fillRect(-5,-8,9,16);X.restore();
  X.save();X.translate(w+7-wob,h*.1);X.rotate(-.3);X.fillStyle='#b88840';X.fillRect(-4,-8,9,16);X.restore();
  X.restore();
}

function drawCroc(){
  const cx=W/2,cy=croc.y;
  // Body (extends from cy downward)
  const bodyH=Math.max(0,H-cy+40);
  if(bodyH>0){
    X.fillStyle='#1c4e0e';
    rrect(cx-CROC_CW+10,cy,CROC_CW*2-20,bodyH+20,4);X.fill();
    // Scale texture on body
    X.strokeStyle='#122c08';X.lineWidth=1;
    for(let sy=cy+8;sy<cy+bodyH&&sy<H;sy+=16){
      for(let sx=cx-CROC_CW+14;sx<cx+CROC_CW-14;sx+=18){
        X.beginPath();X.arc(sx,sy,6,.08,Math.PI-.08);X.stroke();
      }
    }
    // Belly stripe (lighter center)
    X.fillStyle='#2a6618';X.globalAlpha=.35;
    rrect(cx-14,cy,28,bodyH,4);X.fill();X.globalAlpha=1;
  }
  // Head platform
  X.fillStyle='#246014';
  rrect(cx-CROC_CW,cy-58,CROC_CW*2,62,10);X.fill();
  // Head highlight
  X.fillStyle='#2e6e1c';rrect(cx-CROC_CW+4,cy-56,CROC_CW*2-8,28,8);X.fill();
  // Head scales
  X.strokeStyle='#183c0c';X.lineWidth=1;
  for(let hx=cx-CROC_CW+10;hx<cx+CROC_CW-10;hx+=18){
    X.beginPath();X.arc(hx,cy-42,6,.1,Math.PI-.1);X.stroke();
  }
  // Dorsal ridge spikes
  X.fillStyle='#1c4c0e';
  for(let rx=-14;rx<=14;rx+=14){
    X.beginPath();X.moveTo(cx+rx,cy-56);X.lineTo(cx+rx+5,cy-66);X.lineTo(cx+rx+10,cy-56);X.closePath();X.fill();
    X.strokeStyle='#0e2c06';X.lineWidth=1;X.stroke();
  }
  // Snout
  X.fillStyle='#1e520e';rrect(cx-CROC_CW*.72,cy-62,CROC_CW*.72*2,16,5);X.fill();
  // Nostrils
  X.fillStyle='#0a1c04';
  X.beginPath();X.ellipse(cx-18,cy-56,5,4,.2,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(cx+18,cy-56,5,4,-.2,0,Math.PI*2);X.fill();
  // Animated jaw
  const jawO=Math.max(0,Math.sin(croc.jawAng*.65)*14+5);
  X.fillStyle='#b82808';
  rrect(cx-CROC_CW+6,cy-jawO+1,CROC_CW*2-12,jawO+3,2);X.fill();
  // Teeth
  X.fillStyle='#e8e8c0';
  for(let tx=cx-CROC_CW+10;tx<cx+CROC_CW-10;tx+=13){
    X.beginPath();X.moveTo(tx,cy-jawO+3);X.lineTo(tx+4,cy-jawO+3);X.lineTo(tx+2,cy+4);X.closePath();X.fill();
  }
  // Eyes
  X.fillStyle='#c8b808';
  X.beginPath();X.ellipse(cx-CROC_CW+17,cy-40,9,11,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(cx+CROC_CW-17,cy-40,9,11,0,0,Math.PI*2);X.fill();
  // Pupils (vertical slit)
  X.fillStyle='#100800';
  X.beginPath();X.ellipse(cx-CROC_CW+17,cy-40,3,8,.15,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(cx+CROC_CW-17,cy-40,3,8,-.15,0,Math.PI*2);X.fill();
  // Eye gleam
  X.fillStyle='rgba(255,255,200,.55)';
  X.beginPath();X.ellipse(cx-CROC_CW+21,cy-43,2.5,2,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(cx+CROC_CW-13,cy-43,2.5,2,0,0,Math.PI*2);X.fill();
}

function drawHud(){
  if(gs===PLAY&&dist>1100&&dist<1500){const da=(dist-1100)/400,al=Math.sin(da*Math.PI)*.8;if(al>0.05){X.save();X.globalAlpha=al;X.fillStyle='#f0c030';X.font='bold 13px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText(bDir>0?'RIVER BENDS →':'← RIVER BENDS',W/2,H*.88);X.restore();}}
  if(gs===PLAY){
    const prog=Math.min(dist/LEN,1);
    X.fillStyle='rgba(0,0,0,.3)';X.fillRect(RR+2,0,5,H);
    X.fillStyle='#40c840';X.fillRect(RR+2,H*(1-prog),5,H*prog);
    X.fillStyle='rgba(255,80,40,.85)';X.fillRect(RR+2,0,5,7);
  }
  if(gs===BOSS){
    const bprog=Math.min(bt/BOSS_DUR,1);
    X.fillStyle='rgba(0,0,0,.45)';rrect(RL+5,38,140,26,6);X.fill();
    X.fillStyle='#40e858';X.fillRect(RL+7,42,~~(126*bprog),18);
    X.fillStyle='#c8e840';X.font='bold 11px monospace';X.textAlign='left';X.textBaseline='middle';
    const sLeft=Math.max(0,Math.ceil((BOSS_DUR-bt)/60));
    X.fillText(sLeft>0?'SURVIVE  '+sLeft+'s':'ALMOST THERE!',RL+14,51);
  }
  X.fillStyle='rgba(0,0,0,.42)';rrect(RL+5,7,130,28,7);X.fill();
  X.fillStyle='#c0dcc0';X.font='bold 12px monospace';X.textAlign='left';X.textBaseline='middle';X.fillText('MAP:',RL+14,21);
  for(let i=0;i<3;i++){X.save();X.translate(RL+76+i*22,21);star(5,8,3.5);X.fillStyle=i<got?'#f0c030':'#1a2a1a';X.fill();X.restore();}
  X.fillStyle='rgba(0,0,0,.42)';rrect(RR-104,7,100,28,7);X.fill();
  X.fillStyle='#88c8a0';X.font='bold 10px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText('WORLD 2',RR-54,17);X.fillText('JUNGLE',RR-54,29);
}

function drawTitle(){
  X.fillStyle='rgba(2,8,2,.88)';X.fillRect(0,0,W,H);X.textAlign='center';X.textBaseline='alphabetic';
  X.fillStyle='#90d870';X.font='bold 60px Georgia,serif';X.fillText('RIVER',W/2,H*.27);
  X.fillStyle='#38c848';X.font='bold 74px Georgia,serif';X.fillText('RUSH',W/2,H*.385);
  X.fillStyle='rgba(90,170,90,.8)';X.font='14px monospace';X.fillText('WORLD 2 — JUNGLE RIVER',W/2,H*.495);
  X.fillStyle='rgba(70,150,70,.65)';X.font='12px monospace';X.fillText('Collect 3 map pieces',W/2,H*.55);X.fillText('then OUTRUN THE GIANT CROC',W/2,H*.583);
  X.fillStyle='rgba(50,110,50,.6)';X.font='11px monospace';X.fillText('Beware whirlpools — they pull you in!',W/2,H*.636);
  if(bestScore>0||everCleared){
    if(everCleared){X.fillStyle='rgba(0,0,0,.38)';rrect(W/2-86,H*.664,172,40,7);X.fill();X.fillStyle='#68e898';X.font='bold 13px monospace';X.textBaseline='middle';X.fillText('CLEARED!',W/2,H*.664+14);X.fillStyle='#f0c030';X.font='11px monospace';X.fillText('best: '+fmt(bestScore)+' pts',W/2,H*.664+30);}
    else{X.fillStyle='rgba(0,0,0,.38)';rrect(W/2-84,H*.667,168,24,6);X.fill();X.fillStyle='#f0c030';X.font='bold 13px monospace';X.textBaseline='middle';X.fillText('best: '+fmt(bestScore)+' pts',W/2,H*.667+12);}
  }
  const p=.88+Math.sin(fc*.05)*.12;X.globalAlpha=p;X.fillStyle='#f0c030';X.font='bold 17px monospace';X.textBaseline='alphabetic';X.fillText('[ PRESS SPACE TO START ]',W/2,H*.795);X.globalAlpha=1;
  
  // Menu hint
  X.fillStyle='rgba(80,110,135,.38)';X.font='10px monospace';X.textAlign='center';X.textBaseline='alphabetic';X.fillText('ESC · World Select',W/2,H*.97);  X.fillStyle='#e03030';X.beginPath();X.ellipse(W/2,H*.878,22,10,0,0,Math.PI*2);X.fill();X.strokeStyle='#b88840';X.lineWidth=2.5;X.lineCap='round';X.beginPath();X.moveTo(W/2-30,H*.882);X.lineTo(W/2+30,H*.874);X.stroke();
}

function drawWarn(){
  const al=Math.min(warnBt/45,.82);X.fillStyle='rgba(2,14,2,'+al+')';X.fillRect(0,0,W,H);
  if(warnBt<22)return;
  if(Math.sin(fc*.3)>0||warnBt>90){
    X.textAlign='center';X.textBaseline='alphabetic';
    X.fillStyle='#38e838';X.font='bold 38px Georgia,serif';X.fillText('DANGER!',W/2,H*.36);
    X.fillStyle='#c8f040';X.font='bold 20px monospace';X.fillText('GIANT CROC INCOMING!',W/2,H*.46);
    X.fillStyle='#80c880';X.font='13px monospace';X.fillText('Stay ahead — dodge the rocks!',W/2,H*.54);
    X.fillStyle='rgba(60,180,60,.5)';X.font='11px monospace';X.fillText('keep moving UP to survive',W/2,H*.60);
  }
}

function drawDead(){
  X.fillStyle='rgba(2,10,2,.82)';X.fillRect(0,0,W,H);X.textAlign='center';X.textBaseline='alphabetic';
  X.fillStyle='#58c868';X.font='bold 44px Georgia,serif';X.fillText('WIPEOUT!',W/2,H*.3);
  X.fillStyle='rgba(0,0,0,.38)';rrect(W/2-100,H*.335,200,64,8);X.fill();
  X.fillStyle='#b0d8c0';X.font='bold 12px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText('THIS RUN',W/2,H*.335+14);
  X.fillStyle='#f0c030';X.font='bold 25px monospace';X.fillText(fmt(runScore)+' pts',W/2,H*.335+36);
  X.fillStyle='rgba(120,190,140,.6)';X.font='11px monospace';X.fillText(got+'x map('+fmt(got*2000)+') + dist('+fmt(~~dist)+')',W/2,H*.335+56);
  if(isNewBest){const nb=.9+Math.sin(fc*.1)*.1;X.globalAlpha=nb;X.fillStyle='#f0c030';X.font='bold 16px monospace';X.textBaseline='alphabetic';X.fillText('NEW PERSONAL BEST!',W/2,H*.572);X.globalAlpha=1;}
  else if(bestScore>0){X.fillStyle='rgba(90,150,110,.7)';X.font='12px monospace';X.textBaseline='alphabetic';X.fillText('best: '+fmt(bestScore)+' pts',W/2,H*.575);}
  X.fillStyle='#78a888';X.font='12px monospace';X.textBaseline='alphabetic';X.fillText('map pieces:',W/2,H*.634);
  for(let i=0;i<3;i++){X.save();X.translate(W/2-26+i*26,H*.678);star(5,11,5);X.fillStyle=i<got?'#f0c030':'#1a2a1a';X.fill();X.restore();}
  const p=.85+Math.sin(fc*.07)*.15;X.globalAlpha=p;X.fillStyle='#f0c030';X.font='bold 16px monospace';X.textBaseline='alphabetic';X.fillText('[ SPACE to try again ]',W/2,H*.785);X.globalAlpha=1;
}

function drawWin(){
  X.fillStyle='rgba(2,12,2,.87)';X.fillRect(0,0,W,H);X.textAlign='center';X.textBaseline='alphabetic';
  X.fillStyle='#68e898';X.font='bold 32px Georgia,serif';X.fillText('WORLD 2 CLEARED!',W/2,H*.27);
  X.fillStyle='#c8f040';X.font='bold 20px monospace';X.fillText('YOU OUTRAN THE CROC!',W/2,H*.36);
  X.fillStyle='rgba(0,0,0,.38)';rrect(W/2-100,H*.385,200,64,8);X.fill();
  X.fillStyle='#b0d8c0';X.font='bold 12px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText('FINAL SCORE',W/2,H*.385+14);
  X.fillStyle='#f0c030';X.font='bold 25px monospace';X.fillText(fmt(runScore)+' pts',W/2,H*.385+36);
  X.fillStyle='rgba(120,190,140,.6)';X.font='11px monospace';X.fillText('map(6,000) + dist('+fmt(~~dist)+') + boss(5,000)',W/2,H*.385+56);
  if(isNewBest){const nb=.9+Math.sin(fc*.1)*.1;X.globalAlpha=nb;X.fillStyle='#f0c030';X.font='bold 16px monospace';X.textBaseline='alphabetic';X.fillText('NEW PERSONAL BEST!',W/2,H*.578);X.globalAlpha=1;}
  for(let i=0;i<3;i++){X.save();X.translate(W/2-32+i*32,H*.638);X.rotate(fc*.03);star(5,15,6.5);X.fillStyle='#f0c030';X.fill();X.restore();}
  X.fillStyle='#78c890';X.font='13px monospace';X.textBaseline='alphabetic';X.fillText('Worlds 3–5 coming soon!',W/2,H*.735);
  const p=.85+Math.sin(fc*.06)*.15;X.globalAlpha=p;X.fillStyle='#68e898';X.font='bold 16px monospace';X.fillText('[ SPACE to play again ]',W/2,H*.81);X.globalAlpha=1;
}

function loop(){
  upd();drawBg();
  if(gs===TITLE){drawTitle();}
  else{
    if(gs===BOSS)drawCroc();
    drawObs();drawWhirlpools();drawMps();
    if(gs===BOSS){X.fillStyle='rgba(10,40,10,'+(0.07+Math.sin(fc*.08)*.04)+')';X.fillRect(RL,0,RW,H);}
    for(const p of prt){const a=p.life/p.ml;X.save();X.globalAlpha=a;X.fillStyle=p.c;X.beginPath();X.arc(p.x,p.y,p.s,0,Math.PI*2);X.fill();X.restore();}
    drawPlayer();drawHud();
    if(gs===WARN)drawWarn();if(gs===DEAD)drawDead();if(gs===WIN)drawWin();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
