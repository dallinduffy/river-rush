<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>River Rush — World 1: Alpine</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a1520;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}canvas{border-radius:10px;display:block}p{color:#4a6a80;font-size:12px;margin-top:8px;text-align:center;font-family:monospace}</style>
</head>
<body>
<canvas id="rc" width="420" height="620"></canvas>
<p>Arrow keys to steer · Space to start · One hit = wipeout · Score persists between sessions</p>
<script>
const cv=document.getElementById('rc'),X=cv.getContext('2d'),W=cv.width,H=cv.height;
const RL=72,RR=348,RW=RR-RL;
const TITLE=0,PLAY=1,WARN=2,BOSS=3,WIN=4,DEAD=5;
let gs=TITLE,fc=0;
const P={x:W/2,y:H-120,w:16,h:36,spd:4,alive:true};
let spd=2.8,dist=0,scroll=0,st=30;
const LEN=3600;
let obs=[],mps=[],prt=[],placed=[0,0,0],got=0;
let bDir=1,bOff=0;
let logs=[],lst=80;
let bw=[],bi=0,bt=0,wt=0;
const BW=5,WD=150;
let runScore=0,bestScore=0,everCleared=false,isNewBest=false;
function loadBest(){try{const d=JSON.parse(localStorage.getItem('rr_w1')||'{}');bestScore=d.s||0;everCleared=d.c||false;}catch(e){}}
function saveBest(){try{const ok=runScore>bestScore||(gs===WIN&&!everCleared);if(ok){if(runScore>bestScore)bestScore=runScore;if(gs===WIN)everCleared=true;localStorage.setItem('rr_w1',JSON.stringify({s:bestScore,c:everCleared}));}}catch(e){}}
loadBest();
const keys={};
document.addEventListener('keydown',e=>{if(e.code==='Escape'){window.location.href='river-rush-menu.html';return;}keys[e.code]=true;if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code))e.preventDefault();if((e.code==='Space'||e.code==='Enter')&&[TITLE,DEAD,WIN].includes(gs))reset();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
const flines=Array.from({length:22},()=>({x:RL+Math.random()*RW,y:Math.random()*H,len:12+Math.random()*24,a:0.07+Math.random()*0.14}));
const flakes=Array.from({length:26},()=>({x:Math.random()*W,y:Math.random()*H,r:0.5+Math.random()*1.3,s:0.3+Math.random()*0.6}));
function mkRock(x,y,r){const pts=[],n=7+~~(Math.random()*4);for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2,rr=r*(.65+Math.random()*.45);pts.push([Math.cos(a)*rr,Math.sin(a)*rr]);}return{x,y,r,pts};}
function mkLog(y){const w=58+Math.random()*30,dir=Math.random()<.5?1:-1,vx=dir*(0.85+Math.random()*0.95);return{x:dir>0?RL:RR-w,y,w,h:13,vx};}
function rrect(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.arcTo(x+w,y,x+w,y+r,r);X.lineTo(x+w,y+h-r);X.arcTo(x+w,y+h,x+w-r,y+h,r);X.lineTo(x+r,y+h);X.arcTo(x,y+h,x,y+h-r,r);X.lineTo(x,y+r);X.arcTo(x,y,x+r,y,r);X.closePath();}
function star(spk,oR,iR){X.beginPath();let rot=-Math.PI/2,step=Math.PI/spk;X.moveTo(Math.cos(rot)*oR,Math.sin(rot)*oR);for(let i=0;i<spk;i++){rot+=step;X.lineTo(Math.cos(rot)*iR,Math.sin(rot)*iR);rot+=step;X.lineTo(Math.cos(rot)*oR,Math.sin(rot)*oR);}X.closePath();}
function rn(a,b){return a+Math.random()*(b-a);}
function computeBend(d){const s=1300,e=1900;if(d<s)return 0;if(d>=e)return bDir*40;const p=(d-s)/(e-s),sm=p*p*(3-2*p);return bDir*40*sm;}
function fmt(n){return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function calcScore(){return got*2000+~~dist+(gs===WIN?5000:0);}
function reset(){gs=PLAY;fc=0;spd=2.8;dist=0;scroll=0;st=30;P.x=W/2;P.y=H-120;P.alive=true;obs=[];mps=[];prt=[];placed=[0,0,0];got=0;bw=[];bi=0;bt=0;wt=0;runScore=0;isNewBest=false;logs=[];lst=80;bDir=Math.random()<.5?1:-1;bOff=0;}
function spawnRocks(){
  if(Math.random()<.28){const r1=13+Math.random()*9,r2=13+Math.random()*9,g=38+Math.random()*16,tot=r1+g+r2;if(tot<RW-24){const x1=RL+r1+4+Math.random()*(RW-tot-8),x2=x1+r1+g+r2;if(x2+r2<RR-4){obs.push(mkRock(x1,-r1-4,r1));obs.push(mkRock(x2,-r2-4,r2));return;}}}
  const r=16+Math.random()*10;obs.push(mkRock(RL+r+4+Math.random()*(RW-r*2-8),-r-4,r));
}
function spawnMp(i){mps.push({x:RL+30+Math.random()*(RW-60),y:-24,i,got:false,ph:Math.random()*Math.PI*2});placed[i]=1;}
function genWave(wi){
  const bh=46,wspd=3.2+wi*.4,segs=[];
  function addSeg(x,w){if(w<8)return;const cracks=[];for(let c=1;c<Math.floor(w/24);c++)cracks.push({cx:x+c*24,dx:rn(-7,7)});segs.push({x,w,cracks});}
  if(wi<3){const g1w=70+Math.random()*18,g2w=68+Math.random()*16,g1x=RL+8+Math.random()*60,g2x=g1x+g1w+62+Math.random()*28;if(g2x+g2w<RR-8){addSeg(RL,g1x-RL);addSeg(g1x+g1w,g2x-g1x-g1w);addSeg(g2x+g2w,RR-g2x-g2w);}else{const gw=74,gx=RL+14+Math.random()*(RW-gw-28);addSeg(RL,gx-RL);addSeg(gx+gw,RR-gx-gw);}}
  else{const gw=64+Math.random()*10,gx=RL+14+Math.random()*(RW-gw-28);addSeg(RL,gx-RL);addSeg(gx+gw,RR-gx-gw);}
  return{y:-bh,h:bh,segs,spd:wspd};
}
function hit(){if(!P.alive)return;P.alive=false;for(let i=0;i<14;i++)prt.push({x:P.x,y:P.y,vx:rn(-4,4),vy:-2-Math.random()*3,life:55+Math.random()*30,ml:85,c:'#7fc8e8',s:2+Math.random()*3.5});runScore=calcScore();isNewBest=runScore>bestScore;saveBest();setTimeout(()=>{gs=DEAD;},950);}
function col(){
  if(!P.alive)return;const px=P.x,py=P.y,pr=P.w/2-1;
  const rpx=px-~~bOff;
  if(rpx-pr<RL||rpx+pr>RR){hit();return;}
  for(const o of obs){const dx=rpx-o.x,dy=py-o.y;if(dx*dx+dy*dy<(pr+o.r*.7)*(pr+o.r*.7)){hit();return;}}
  for(const l of logs){const nx=Math.max(l.x,Math.min(rpx,l.x+l.w)),ny=Math.max(l.y,Math.min(py,l.y+l.h)),ldx=px-nx,ldy=py-ny;if(ldx*ldx+ldy*ldy<(pr+2)*(pr+2)){hit();return;}}
  for(const m of mps){if(m.got)continue;const dx=px-m.x,dy=py-m.y;if(dx*dx+dy*dy<(pr+17)*(pr+17)){m.got=true;got++;for(let i=0;i<12;i++)prt.push({x:m.x,y:m.y,vx:rn(-3.5,3.5),vy:-1.5-Math.random()*2.5,life:45+Math.random()*20,ml:65,c:'#f0c030',s:2+Math.random()*3});}}
  if(gs===BOSS){for(const w of bw)for(const seg of w.segs){const nx=Math.max(seg.x,Math.min(px,seg.x+seg.w)),ny=Math.max(w.y,Math.min(py,w.y+w.h)),dx=px-nx,dy=py-ny;if(dx*dx+dy*dy<(pr+2)*(pr+2)){hit();return;}}}
}
function upd(){
  fc++;
  for(const f of flines){f.y+=spd*.55;if(f.y>H){f.y=-f.len;f.x=RL+Math.random()*RW;}}
  for(const s of flakes){s.y+=s.s+spd*.12;if(s.y>H){s.y=-2;s.x=Math.random()*W;}}
  for(let i=prt.length-1;i>=0;i--){const p=prt[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life--;if(p.life<=0)prt.splice(i,1);}
  if([TITLE,DEAD,WIN].includes(gs))return;
  if(gs===WARN){bt++;if(bt>=WD){gs=BOSS;wt=40;}return;}
  if(!P.alive)return;
  if(keys['ArrowLeft'])P.x-=P.spd;if(keys['ArrowRight'])P.x+=P.spd;if(keys['ArrowUp'])P.y-=P.spd*.55;if(keys['ArrowDown'])P.y+=P.spd*.55;
  P.x=Math.max(RL+~~bOff+P.w/2+1,Math.min(RR+~~bOff-P.w/2-1,P.x));P.y=Math.max(H*.1,Math.min(H-60,P.y));
  if(gs===PLAY){
    dist+=spd;scroll+=spd;spd=Math.min(5.5,2.8+dist/2000);
    const nb=computeBend(dist),db=nb-bOff;bOff=nb;if(db){P.x+=db;P.x=Math.max(RL+~~bOff+P.w/2+1,Math.min(RR+~~bOff-P.w/2-1,P.x));}
    if(dist>200){st--;if(st<=0){spawnRocks();const prog=Math.min(1,(dist-200)/(LEN-200));st=~~(52-prog*34)+~~(Math.random()*14);}}
    for(let i=obs.length-1;i>=0;i--){obs[i].y+=spd;if(obs[i].y>H+55)obs.splice(i,1);}
    const ms=[.28,.58,.87];for(let i=0;i<3;i++)if(!placed[i]&&dist>=LEN*ms[i])spawnMp(i);
    for(let i=mps.length-1;i>=0;i--){mps[i].y+=spd;if(mps[i].y>H+38){if(!mps[i].got){mps[i].y=-24;mps[i].x=RL+30+Math.random()*(RW-60);}else mps.splice(i,1);}}
    if(got>=3){obs=[];logs=[];gs=WARN;bt=0;}
    if(dist>500){lst--;if(lst<=0){logs.push(mkLog(-20));const lp=Math.min(1,(dist-500)/(LEN-500));lst=~~(68-lp*26)+~~(Math.random()*28);}}
    for(let i=logs.length-1;i>=0;i--){const l=logs[i];l.x+=l.vx;l.y+=spd;if(l.x<RL){l.x=RL;l.vx=Math.abs(l.vx);}if(l.x+l.w>RR){l.x=RR-l.w;l.vx=-Math.abs(l.vx);}if(l.y>H+20)logs.splice(i,1);}
    col();
  }else if(gs===BOSS){
    wt--;if(wt<=0&&bi<BW){bw.push(genWave(bi));bi++;wt=108;}
    for(let i=bw.length-1;i>=0;i--){bw[i].y+=bw[i].spd;if(bw[i].y>H+12)bw.splice(i,1);}
    if(bi>=BW&&bw.length===0){gs=WIN;runScore=calcScore();isNewBest=runScore>bestScore||!everCleared;saveBest();}
    col();
  }
}
function drawBg(){
  X.fillStyle='#8cc6e0';X.fillRect(0,0,W,H*.22);X.fillStyle='#aad8f0';X.fillRect(0,H*.22,W,H*.1);
  X.fillStyle='#7a9ab5';
  [[34,90,115],[126,110,140],[218,82,120],[310,106,134],[386,76,108]].forEach(([mx,mh,mw])=>{X.beginPath();X.moveTo(mx-mw/2,H*.32);X.lineTo(mx,H*.32-mh);X.lineTo(mx+mw/2,H*.32);X.closePath();X.fill();X.fillStyle='#ddeef8';X.beginPath();X.moveTo(mx-mw*.14,H*.32-mh*.63);X.lineTo(mx,H*.32-mh);X.lineTo(mx+mw*.14,H*.32-mh*.63);X.closePath();X.fill();X.fillStyle='#7a9ab5';});
  X.fillStyle='#5e6e54';X.fillRect(0,0,RL+~~bOff,H);X.fillRect(RR+~~bOff,0,W-RR-~~bOff,H);
  const sy=-(~~scroll%36);for(let y=sy;y<H;y+=36){X.fillStyle='rgba(0,0,0,0.04)';X.fillRect(0,y,RL,18);X.fillRect(RR,y,W-RR,18);}
  X.fillStyle='#cce0ea';X.fillRect(RL-8,0,8,H);X.fillRect(RR,0,8,H);
  X.fillStyle='#185a74';X.save();X.translate(~~bOff,0);X.fillRect(RL,0,RW,H);X.restore();
  for(const f of flines){X.save();X.globalAlpha=f.a;X.strokeStyle='#70c8e8';X.lineWidth=1.5;X.beginPath();X.moveTo(f.x,f.y);X.lineTo(f.x+1,f.y+f.len);X.stroke();X.restore();}
  X.fillStyle='rgba(255,255,255,0.65)';for(const s of flakes){X.beginPath();X.arc(s.x,s.y,s.r,0,Math.PI*2);X.fill();}
}
function drawObs(){X.save();X.translate(~~bOff,0);for(const o of obs){X.save();X.translate(o.x,o.y);X.globalAlpha=.22;X.fillStyle='#aad8e8';X.beginPath();X.ellipse(0,0,o.r+8,o.r+5,0,0,Math.PI*2);X.fill();X.globalAlpha=.15;X.fillStyle='#fff';X.beginPath();X.ellipse(0,o.r+3,o.r*.5,7,0,0,Math.PI*2);X.fill();X.globalAlpha=1;X.fillStyle='#6b5e50';X.beginPath();X.moveTo(o.pts[0][0],o.pts[0][1]);o.pts.forEach(([a,b])=>X.lineTo(a,b));X.closePath();X.fill();X.fillStyle='#8a7a6a';X.beginPath();X.ellipse(-o.r*.18,-o.r*.28,o.r*.3,o.r*.17,-.4,0,Math.PI*2);X.fill();X.restore();}}
function drawLogs(){X.save();X.translate(~~bOff,0);for(const l of logs){const{x,y,w,h}=l;X.save();X.globalAlpha=.2;X.fillStyle='#2a1000';X.beginPath();X.ellipse(x+w/2,y+h+5,w/2+6,5,0,0,Math.PI*2);X.fill();X.globalAlpha=1;X.fillStyle='#7a4218';rrect(x,y,w,h,6);X.fill();X.fillStyle='#5c2e0c';X.lineWidth=1;X.strokeStyle='#5c2e0c';for(let gx=x+11;gx<x+w-7;gx+=13){X.beginPath();X.moveTo(gx,y+2);X.lineTo(gx+3,y+h-2);X.stroke();}X.fillStyle='rgba(210,150,80,.28)';rrect(x+3,y+2,w-6,4,2);X.fill();X.fillStyle='#3d1606';X.beginPath();X.ellipse(x+6,y+h/2,6,h/2-1,0,0,Math.PI*2);X.fill();X.beginPath();X.ellipse(x+w-6,y+h/2,6,h/2-1,0,0,Math.PI*2);X.fill();X.strokeStyle='rgba(255,180,100,.15)';X.lineWidth=1.5;X.beginPath();X.moveTo(x+6,y+h+2);X.quadraticCurveTo(x+w/2,y+h+8,x+w-6,y+h+2);X.stroke();X.restore();}X.restore();}
function drawMps(){X.save();X.translate(~~bOff,0);for(const m of mps){if(m.got)continue;const bob=Math.sin(fc*.06+m.ph)*3,gl=.28+Math.sin(fc*.09)*.14;X.save();X.translate(m.x,m.y+bob);X.globalAlpha=gl;X.fillStyle='#ffe060';X.beginPath();X.arc(0,0,21,0,Math.PI*2);X.fill();X.globalAlpha=1;star(5,14,6.5);X.fillStyle='#f0c030';X.fill();X.strokeStyle='#fff8cc';X.lineWidth=1.5;X.stroke();X.fillStyle='#7a5010';X.font='bold 8px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText('MAP',0,0);X.restore();}X.restore();}
function drawPlayer(){if(!P.alive)return;const{x,y,w,h}=P,wob=Math.sin(fc*.12)*1.5;X.save();X.translate(x,y);X.rotate(wob*.035);X.globalAlpha=.18;X.strokeStyle='#70c8e8';X.lineWidth=2;X.beginPath();X.ellipse(0,h/2+4,w/2+5,5,0,0,Math.PI*2);X.stroke();X.globalAlpha=1;X.fillStyle='#e03030';X.beginPath();X.ellipse(0,0,w/2,h/2,0,0,Math.PI*2);X.fill();X.strokeStyle='#a01818';X.lineWidth=1;X.beginPath();X.moveTo(0,-h/2+3);X.lineTo(0,h/2-3);X.stroke();X.fillStyle='#5a0808';X.beginPath();X.ellipse(0,-h*.05,w*.26,h*.14,0,0,Math.PI*2);X.fill();X.strokeStyle='#b88840';X.lineWidth=2.5;X.lineCap='round';X.beginPath();X.moveTo(-w-7+wob,-h*.1);X.lineTo(w+7-wob,h*.1);X.stroke();X.save();X.translate(-w-7+wob,-h*.1);X.rotate(-.3);X.fillStyle='#b88840';X.fillRect(-5,-8,9,16);X.restore();X.save();X.translate(w+7-wob,h*.1);X.rotate(-.3);X.fillStyle='#b88840';X.fillRect(-4,-8,9,16);X.restore();}
function drawBossWaves(){for(const w of bw){for(const seg of w.segs){X.fillStyle='#908070';rrect(seg.x,w.y,seg.w,w.h,5);X.fill();X.strokeStyle='rgba(60,40,20,.5)';X.lineWidth=1;for(const ck of seg.cracks){X.beginPath();X.moveTo(ck.cx,w.y+2);X.lineTo(ck.cx+ck.dx,w.y+w.h-2);X.stroke();}X.fillStyle='#b0a090';rrect(seg.x,w.y,seg.w,6,3);X.fill();X.fillStyle='rgba(210,230,245,.75)';X.beginPath();X.ellipse(seg.x+seg.w/2,w.y+2,Math.max(4,seg.w/2-3),5,0,0,Math.PI*2);X.fill();}}}
function drawHud(){
  if(gs===PLAY&&dist>1100&&dist<1500){const da=(dist-1100)/400,al=Math.sin(da*Math.PI)*.8;if(al>0.05){X.save();X.globalAlpha=al;X.fillStyle='#f0c030';X.font='bold 13px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText(bDir>0?'RIVER BENDS →':'← RIVER BENDS',W/2,H*.88);X.restore();}}
  if(gs===PLAY){const prog=Math.min(dist/LEN,1);X.fillStyle='rgba(0,0,0,.3)';X.fillRect(RR+2,0,5,H);X.fillStyle='#40c870';X.fillRect(RR+2,H*(1-prog),5,H*prog);X.fillStyle='rgba(255,80,40,.85)';X.fillRect(RR+2,0,5,7);}
  if(gs===BOSS){X.fillStyle='rgba(0,0,0,.45)';rrect(RL+5,38,130,26,6);X.fill();X.fillStyle='#ffaa60';X.font='bold 12px monospace';X.textAlign='left';X.textBaseline='middle';X.fillText('WAVE '+Math.min(bi,BW)+' / '+BW,RL+16,51);}
  X.fillStyle='rgba(0,0,0,.42)';rrect(RL+5,7,130,28,7);X.fill();X.fillStyle='#ddeef8';X.font='bold 12px monospace';X.textAlign='left';X.textBaseline='middle';X.fillText('MAP:',RL+14,21);
  for(let i=0;i<3;i++){X.save();X.translate(RL+76+i*22,21);star(5,8,3.5);X.fillStyle=i<got?'#f0c030':'#2a3a4a';X.fill();X.restore();}
  X.fillStyle='rgba(0,0,0,.42)';rrect(RR-104,7,100,28,7);X.fill();X.fillStyle='#aaccdd';X.font='bold 10px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText('WORLD 1',RR-54,17);X.fillText('ALPINE',RR-54,29);
}
function drawTitle(){
  X.fillStyle='rgba(4,14,26,.87)';X.fillRect(0,0,W,H);X.textAlign='center';X.textBaseline='alphabetic';
  X.fillStyle='#c8e4f4';X.font='bold 60px Georgia,serif';X.fillText('RIVER',W/2,H*.27);
  X.fillStyle='#40b8e0';X.font='bold 74px Georgia,serif';X.fillText('RUSH',W/2,H*.385);
  X.fillStyle='rgba(120,180,210,.8)';X.font='14px monospace';X.fillText('WORLD 1 — ALPINE MOUNTAIN',W/2,H*.495);
  X.fillStyle='rgba(100,160,200,.65)';X.font='12px monospace';X.fillText('Collect 3 map pieces',W/2,H*.55);X.fillText('then survive THE AVALANCHE',W/2,H*.583);
  X.fillStyle='rgba(90,130,160,.6)';X.font='11px monospace';X.fillText('arrow keys to steer & speed',W/2,H*.636);
  if(bestScore>0||everCleared){
    if(everCleared){X.fillStyle='rgba(0,0,0,.38)';rrect(W/2-86,H*.664,172,40,7);X.fill();X.fillStyle='#68e898';X.font='bold 13px monospace';X.textBaseline='middle';X.fillText('CLEARED!',W/2,H*.664+14);X.fillStyle='#f0c030';X.font='11px monospace';X.fillText('best: '+fmt(bestScore)+' pts',W/2,H*.664+30);}
    else{X.fillStyle='rgba(0,0,0,.38)';rrect(W/2-84,H*.667,168,24,6);X.fill();X.fillStyle='#f0c030';X.font='bold 13px monospace';X.textBaseline='middle';X.fillText('best: '+fmt(bestScore)+' pts',W/2,H*.667+12);}
  }
  const p=.88+Math.sin(fc*.05)*.12;X.globalAlpha=p;X.fillStyle='#f0c030';X.font='bold 17px monospace';X.textBaseline='alphabetic';X.fillText('[ PRESS SPACE TO START ]',W/2,H*.795);X.globalAlpha=1;
  
  // Menu hint
  X.fillStyle='rgba(80,110,135,.38)';X.font='10px monospace';X.textAlign='center';X.textBaseline='alphabetic';X.fillText('ESC · World Select',W/2,H*.97);  X.fillStyle='#e03030';X.beginPath();X.ellipse(W/2,H*.878,22,10,0,0,Math.PI*2);X.fill();X.strokeStyle='#b88840';X.lineWidth=2.5;X.lineCap='round';X.beginPath();X.moveTo(W/2-30,H*.882);X.lineTo(W/2+30,H*.874);X.stroke();
}
function drawWarn(){const al=Math.min(bt/45,.8);X.fillStyle='rgba(18,4,4,'+al+')';X.fillRect(0,0,W,H);if(bt<22)return;if(Math.sin(fc*.3)>0||bt>90){X.textAlign='center';X.textBaseline='alphabetic';X.fillStyle='#ff3828';X.font='bold 38px Georgia,serif';X.fillText('WARNING!',W/2,H*.38);X.fillStyle='#ffc838';X.font='bold 22px monospace';X.fillText('AVALANCHE INCOMING',W/2,H*.48);X.fillStyle='#b8d8e8';X.font='13px monospace';X.fillText("Find the gaps — don't get crushed!",W/2,H*.56);}}
function drawDead(){
  X.fillStyle='rgba(4,14,26,.82)';X.fillRect(0,0,W,H);X.textAlign='center';X.textBaseline='alphabetic';
  X.fillStyle='#7cc8e8';X.font='bold 44px Georgia,serif';X.fillText('WIPEOUT!',W/2,H*.3);
  X.fillStyle='rgba(0,0,0,.38)';rrect(W/2-100,H*.335,200,64,8);X.fill();
  X.fillStyle='#b8ccd8';X.font='bold 12px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText('THIS RUN',W/2,H*.335+14);
  X.fillStyle='#f0c030';X.font='bold 25px monospace';X.fillText(fmt(runScore)+' pts',W/2,H*.335+36);
  X.fillStyle='rgba(160,200,220,.6)';X.font='11px monospace';X.fillText(got+'x map('+fmt(got*2000)+') + dist('+fmt(~~dist)+')',W/2,H*.335+56);
  if(isNewBest){const nb=.9+Math.sin(fc*.1)*.1;X.globalAlpha=nb;X.fillStyle='#f0c030';X.font='bold 16px monospace';X.textBaseline='alphabetic';X.fillText('NEW PERSONAL BEST!',W/2,H*.572);X.globalAlpha=1;}
  else if(bestScore>0){X.fillStyle='rgba(130,170,190,.7)';X.font='12px monospace';X.textBaseline='alphabetic';X.fillText('best: '+fmt(bestScore)+' pts',W/2,H*.575);}
  X.fillStyle='#90b0c0';X.font='12px monospace';X.textBaseline='alphabetic';X.fillText('map pieces:',W/2,H*.634);
  for(let i=0;i<3;i++){X.save();X.translate(W/2-26+i*26,H*.678);star(5,11,5);X.fillStyle=i<got?'#f0c030':'#2a3a4a';X.fill();X.restore();}
  const p=.85+Math.sin(fc*.07)*.15;X.globalAlpha=p;X.fillStyle='#f0c030';X.font='bold 16px monospace';X.textBaseline='alphabetic';X.fillText('[ SPACE to try again ]',W/2,H*.785);X.globalAlpha=1;
}
function drawWin(){
  X.fillStyle='rgba(0,18,8,.87)';X.fillRect(0,0,W,H);X.textAlign='center';X.textBaseline='alphabetic';
  X.fillStyle='#68e898';X.font='bold 32px Georgia,serif';X.fillText('WORLD 1 CLEARED!',W/2,H*.27);
  X.fillStyle='#ffc838';X.font='bold 22px monospace';X.fillText('AVALANCHE SURVIVED!',W/2,H*.36);
  X.fillStyle='rgba(0,0,0,.38)';rrect(W/2-100,H*.385,200,64,8);X.fill();
  X.fillStyle='#b8ccd8';X.font='bold 12px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText('FINAL SCORE',W/2,H*.385+14);
  X.fillStyle='#f0c030';X.font='bold 25px monospace';X.fillText(fmt(runScore)+' pts',W/2,H*.385+36);
  X.fillStyle='rgba(160,200,220,.6)';X.font='11px monospace';X.fillText('map(6,000) + dist('+fmt(~~dist)+') + boss(5,000)',W/2,H*.385+56);
  if(isNewBest){const nb=.9+Math.sin(fc*.1)*.1;X.globalAlpha=nb;X.fillStyle='#f0c030';X.font='bold 16px monospace';X.textBaseline='alphabetic';X.fillText('NEW PERSONAL BEST!',W/2,H*.578);X.globalAlpha=1;}
  for(let i=0;i<3;i++){X.save();X.translate(W/2-32+i*32,H*.638);X.rotate(fc*.03);star(5,15,6.5);X.fillStyle='#f0c030';X.fill();X.restore();}
  X.fillStyle='#90c8a0';X.font='13px monospace';X.textBaseline='alphabetic';X.fillText('Worlds 2–5 coming soon!',W/2,H*.735);
  const p=.85+Math.sin(fc*.06)*.15;X.globalAlpha=p;X.fillStyle='#68e898';X.font='bold 16px monospace';X.fillText('[ SPACE to play again ]',W/2,H*.81);X.globalAlpha=1;
}
function loop(){
  upd();drawBg();
  if(gs===TITLE){drawTitle();}
  else{drawObs();drawLogs();drawMps();if(gs===BOSS||gs===WARN)drawBossWaves();if(gs===BOSS){X.fillStyle='rgba(80,10,10,'+(0.1+Math.sin(fc*.08)*.07)+')';X.fillRect(RL,0,RW,H);}for(const p of prt){const a=p.life/p.ml;X.save();X.globalAlpha=a;X.fillStyle=p.c;X.beginPath();X.arc(p.x,p.y,p.s,0,Math.PI*2);X.fill();X.restore();}drawPlayer();drawHud();if(gs===WARN)drawWarn();if(gs===DEAD)drawDead();if(gs===WIN)drawWin();}
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
